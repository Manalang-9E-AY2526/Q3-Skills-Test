<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q3-Skills-Test</title>

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-5 p-5">
<h1>CINE SOPHIA</h1>

<p><strong>STUDENT DETAILS</strong></p>

<label>Full Name</label>
<input class="form-control" type="text" id="name">

<p class="mt-3"><strong>TICKET SELECTION</strong></p>

<label>Quantity (250.00 Each)</label>
<input class="form-control" type="number" id="qty" value="0" min="0">

<br>

<p><strong>PAYMENT DETAILS</strong></p>

<label>Subtotal</label>
<input class="form-control" type="number" readonly id="subt" value="0.00">

<label>Admin Fee</label>
<input class="form-control" type="number" readonly id="fee" value="50.00">

<label>TOTAL</label>
<input class="form-control" type="number" readonly id="total">

<button type="button" class="mt-3 btn btn-danger" onclick="total()">
TOTAL
</button>

<button type="button" class="mt-3 btn btn-danger" onclick="window.location.reload()">
RESET
</button>

</div>

<script src="main.js"></script>
</body>
</html>
